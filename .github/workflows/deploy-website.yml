name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt into Node 24 ahead of GitHub's forced switch on 2026-06-16.
  # Removes the "Node.js 20 actions are deprecated" warnings on
  # checkout/setup-node/upload-artifact/deploy-pages/action-setup.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        env:
          # Project Pages serve at https://<owner>.github.io/<repo>/.
          # Auto-derived so any fork works without configuration.
          # Override via vars.SITE_URL / vars.SITE_BASE for custom domains.
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          SITE_BASE: ${{ vars.SITE_BASE || format('/{0}/', github.event.repository.name) }}
        run: pnpm --filter @navori/website build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
