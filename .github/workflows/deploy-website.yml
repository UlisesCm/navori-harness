name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        env:
          # GitHub Pages serves at <user>.github.io/<repo>/ — adjust BASE if you
          # publish under a project path. For a user/org page (root), leave as "/".
          SITE_URL: ${{ vars.SITE_URL || 'https://navori-ai.github.io' }}
          SITE_BASE: ${{ vars.SITE_BASE || '/' }}
        run: pnpm --filter @navori/website build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
